# Static-site deploy to GitHub Pages.
#
# Builds the Vite app and publishes dist/ as a Pages artifact. The app is a
# project page (served at https://boykoneov.github.io/pharmacographer/), so the
# build MUST set VITE_BASE to the repo-name subpath — asset URLs are otherwise
# absolute to the domain root and the page loads blank.
#
# One-time repo setup: Settings → Pages → Build and deployment → Source =
# "GitHub Actions" (configure-pages below requests enablement, but the toggle
# may still need flipping once).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialise deploys; don't cancel an in-flight one (avoids a half-published site).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Vite 8 requires node ^20.19 || >=22.12; 22 (LTS) is unambiguously in range.
          node-version: 22
          cache: npm

      - run: npm ci

      # Gate the deploy on the same checks we require locally.
      - run: npm test
      - run: npm run lint

      # Base must match the Pages subpath (repo name, case-sensitive).
      - run: npm run build
        env:
          VITE_BASE: /pharmacographer/

      # enablement lets the first run turn Pages on itself (Source = GitHub
      # Actions) instead of failing at deploy until the repo toggle is flipped.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
